<!--
  jump_lab ブラウザ版 ジャンプ力測定ウィジェット
  ------------------------------------------------
  使い方（WordPress）:
  1. 投稿・固定ページの編集画面で「カスタムHTML」ブロックを追加
  2. このファイルの中身をそのまま貼り付け
  3. 広告を入れる場合は、下の「AD SLOT」コメント部分に AdSense のコードを貼り付け
     （発行者ID: ca-pub-XXXXXXXXXXXXXXXX を教えてもらえれば、こちらで直接埋め込みます）

  測定方式: ボタンタップ方式（飛翔時間法）
  - 「ジャンプ開始」をタップした瞬間を離地、次にタップした瞬間を着地とみなして飛翔時間を計測
  - h = g * t^2 / 8 の公式で高さを算出（gは重力加速度 9.8）
  - センサーや動画を使わないため、PC・スマホどちらのブラウザでも権限なしで動作
  - あくまで簡易版。正確な計測はアプリ内のセンサー計測・動画計測に誘導する
-->
<div id="jumplab-widget" style="max-width:420px;margin:24px auto;font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#0A0A0A;border-radius:16px;padding:24px;box-sizing:border-box;color:#fff;">

  <div style="text-align:center;margin-bottom:16px;">
    <div style="font-size:14px;color:#00E5FF;font-weight:bold;letter-spacing:1px;">jump_lab</div>
    <div style="font-size:18px;font-weight:bold;margin-top:4px;">ブラウザで今すぐジャンプ力測定</div>
  </div>

  <div style="background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.5);border-radius:12px;padding:12px;margin-bottom:16px;font-size:12px;color:#ccc;line-height:1.6;">
    ⚠️ この結果はあくまで目安です。<br>
    より正確に測るには、アプリ内の<strong style="color:#fff;">センサー計測・動画計測</strong>をご利用ください。
  </div>

  <div id="jl-status" style="text-align:center;color:#00E5FF;font-size:16px;font-weight:bold;min-height:44px;display:flex;align-items:center;justify-content:center;padding:0 8px;">
    準備完了！下のボタンをタップしてスタート
  </div>

  <div style="display:flex;justify-content:space-evenly;gap:8px;margin:16px 0;">
    <div class="jl-result-box" data-idx="0" style="flex:1;background:#1A1A1A;border:1px solid #333;border-radius:12px;padding:12px 4px;text-align:center;">
      <div style="font-size:11px;color:#888;">1回目</div>
      <div class="jl-result-val" style="font-size:18px;font-weight:bold;color:#555;margin-top:6px;">--</div>
    </div>
    <div class="jl-result-box" data-idx="1" style="flex:1;background:#1A1A1A;border:1px solid #333;border-radius:12px;padding:12px 4px;text-align:center;">
      <div style="font-size:11px;color:#888;">2回目</div>
      <div class="jl-result-val" style="font-size:18px;font-weight:bold;color:#555;margin-top:6px;">--</div>
    </div>
    <div class="jl-result-box" data-idx="2" style="flex:1;background:#1A1A1A;border:1px solid #333;border-radius:12px;padding:12px 4px;text-align:center;">
      <div style="font-size:11px;color:#888;">3回目</div>
      <div class="jl-result-val" style="font-size:18px;font-weight:bold;color:#555;margin-top:6px;">--</div>
    </div>
  </div>

  <button id="jl-btn" style="width:100%;height:64px;background:#00E5FF;color:#000;font-size:17px;font-weight:bold;border:none;border-radius:14px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">
    🦘 ジャンプ開始
  </button>

  <div id="jl-final" style="display:none;text-align:center;margin-top:16px;">
    <div style="font-size:13px;color:#888;">3回の平均</div>
    <div id="jl-avg" style="font-size:32px;font-weight:bold;color:#00E5FF;margin:4px 0;">0cm</div>
    <a id="jl-cta" href="#" style="display:inline-block;margin-top:12px;background:#00E5FF;color:#000;font-weight:bold;padding:12px 24px;border-radius:12px;text-decoration:none;font-size:14px;">
      アプリでもっと正確に測定する →
    </a>
  </div>

  <!-- ==== AD SLOT: ここに Google AdSense のコードを貼り付け ====
  <ins class="adsbygoogle"
       style="display:block;margin-top:16px;"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="XXXXXXXXXX"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  ==== AD SLOT END ==== -->

</div>

<script>
(function() {
  const btn = document.getElementById('jl-btn');
  const status = document.getElementById('jl-status');
  const boxes = document.querySelectorAll('#jumplab-widget .jl-result-box');
  const finalBox = document.getElementById('jl-final');
  const avgEl = document.getElementById('jl-avg');

  const G = 9.8;
  let phase = 'idle'; // idle -> waiting_takeoff -> in_air -> idle
  let takeoffTime = null;
  let attempt = 0;
  const results = [];
  const MAX_ATTEMPTS = 3;

  function setResult(idx, cm) {
    const box = boxes[idx];
    const val = box.querySelector('.jl-result-val');
    val.textContent = cm.toFixed(1) + 'cm';
    val.style.color = '#fff';
    box.style.background = 'rgba(0,229,255,0.15)';
    box.style.borderColor = '#00E5FF';
  }

  function handleTap() {
    if (phase === 'idle' && attempt < MAX_ATTEMPTS) {
      phase = 'in_air';
      takeoffTime = performance.now();
      status.textContent = '着地したらすぐタップ！';
      btn.textContent = '👟 着地したらタップ';
      return;
    }

    if (phase === 'in_air') {
      const flightMs = performance.now() - takeoffTime;
      const t = Math.min(Math.max(flightMs / 1000, 0.05), 1.2); // 現実的な範囲にクランプ
      const heightCm = (G * t * t / 8) * 100;

      setResult(attempt, heightCm);
      results.push(heightCm);
      attempt++;
      phase = 'idle';

      if (attempt < MAX_ATTEMPTS) {
        status.textContent = 'あと' + (MAX_ATTEMPTS - attempt) + '回！次のジャンプへ';
        btn.textContent = '🦘 次のジャンプ';
      } else {
        status.textContent = '計測完了！';
        btn.disabled = true;
        btn.style.opacity = '0.4';
        btn.style.cursor = 'default';
        const avg = results.reduce((a, b) => a + b, 0) / results.length;
        avgEl.textContent = avg.toFixed(1) + 'cm';
        finalBox.style.display = 'block';
      }
    }
  }

  btn.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    handleTap();
  });

  // CTAリンク先はストア公開後に差し替え
  document.getElementById('jl-cta').href = '#';
})();
</script>
